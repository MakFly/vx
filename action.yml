name: 'VX Security Scanner'
description: 'Fast, multi-module security scanner for web applications'
author: 'kev'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  url:
    description: 'Target URL to scan'
    required: true
  min-score:
    description: 'Minimum passing score (0-100)'
    required: false
    default: '70'
  fail-on-score:
    description: 'Fail workflow if below threshold'
    required: false
    default: 'true'
  comment-pr:
    description: 'Post/update comment on pull requests'
    required: false
    default: 'true'
  update-badge:
    description: 'Update badge JSON on push'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'
  badge-path:
    description: 'Path for badge JSON file'
    required: false
    default: '.github/vx-badge.json'
  modules:
    description: 'Comma-separated list of modules (default: all)'
    required: false
    default: ''
  threads:
    description: 'Number of concurrent threads'
    required: false
    default: '10'
  github-token:
    description: 'GitHub token for PR comments and badge commits'
    required: false
    default: ${{ github.token }}

outputs:
  score:
    description: 'Security score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Letter grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  total-findings:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.total-findings }}
  critical-findings:
    description: 'Number of critical findings'
    value: ${{ steps.scan.outputs.critical-findings }}
  high-findings:
    description: 'Number of high findings'
    value: ${{ steps.scan.outputs.high-findings }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build VX
      shell: bash
      run: |
        cd ${{ github.action_path }}
        go build -o vx ./main.go
        echo "${{ github.action_path }}" >> $GITHUB_PATH

    - name: Run Security Scan
      id: scan
      shell: bash
      run: |
        ARGS="--ci --min-score 0"
        ARGS="$ARGS --threads ${{ inputs.threads }}"
        ARGS="$ARGS --sarif vx-results.sarif"
        ARGS="$ARGS --badge ${{ inputs.badge-path }}"
        ARGS="$ARGS --markdown vx-report.md"
        ARGS="$ARGS --json > vx-results.json"

        if [ -n "${{ inputs.modules }}" ]; then
          ARGS="$ARGS --modules ${{ inputs.modules }}"
        fi

        vx scan ${{ inputs.url }} $ARGS || true

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: vx-results.sarif
      continue-on-error: true

    - name: Comment on PR
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: vx-security
        path: vx-report.md
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Update Badge
      if: inputs.update-badge == 'true' && github.event_name == 'push'
      shell: bash
      run: |
        if [ -f "${{ inputs.badge-path }}" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.badge-path }}"
          git diff --cached --quiet || git commit -m "chore: update VX security badge [skip ci]"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Check Score Threshold
      if: inputs.fail-on-score == 'true'
      shell: bash
      run: |
        SCORE="${{ steps.scan.outputs.score }}"
        MIN="${{ inputs.min-score }}"
        if [ "${SCORE:-0}" -lt "${MIN:-70}" ]; then
          echo "::error::VX Security Score ${SCORE} is below minimum ${MIN}"
          exit 1
        fi
